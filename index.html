<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ILG SmartTest — Sistem Kuis Karyawan</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700&display=swap" rel="stylesheet" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="style-modern-saas-2025.css">
</head>
<script>
     if ('serviceWorker' in navigator) {
       navigator.serviceWorker.register('/pwa/sw.js');
     }
     // fallback buat browser yang nggak support Background Sync (Safari/iOS)
     window.addEventListener('online', () => {
       navigator.serviceWorker.ready.then((reg) => {
         reg.active?.postMessage({ type: 'TRY_SYNC_RESULTS' });
       });
     });
   </script>
<body>
  <div id="app"></div>
  <script src="bundle1.min.js"></script>
