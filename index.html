<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ILG SmartTest — Sistem Kuis Karyawan</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700&display=swap" rel="stylesheet" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="style-modern-saas-2025.css">
</head>
<body>

  <!-- ==== HAMBURGER MENU ==== -->
  <div id="hb-overlay">
    <button id="hb-toggle" aria-label="Buka menu">
      <span></span><span></span><span></span>
    </button>

    <div id="hb-backdrop"></div>

    <nav id="hb-drawer">
      <div class="hb-drawer-header">
        <img src="logoilg.jpeg" alt="Logo" class="hb-logo" />
        <span>ILG SmartTest</span>
      </div>
      <ul id="hb-menu-list"><!-- diisi otomatis lewat JS --></ul>
    </nav>
  </div>
  <!-- ==== END HAMBURGER MENU ==== -->

  <div id="app"></div>

  <script>
    // Sesuaikan daftar ini dengan teks tombol nav yang SUDAH ADA di app Anda.
    // 'match' = teks yang dicari di tombol/link nav yang dirender bundle1.min.js.
    // 'label' = teks yang tampil di drawer hamburger.
    var MENU_ITEMS = [
      { label: 'Beranda', match: 'Beranda' },
      { label: 'Kuis Saya', match: 'Kuis Saya' },
      { label: 'Hasil Saya', match: 'Hasil Saya' },
      { label: 'Keluar', match: 'Keluar' }
    ];

    (function () {
      var toggleBtn = document.getElementById('hb-toggle');
      var drawer = document.getElementById('hb-drawer');
      var backdrop = document.getElementById('hb-backdrop');
      var list = document.getElementById('hb-menu-list');

      function buildMenu() {
        list.innerHTML = '';
        MENU_ITEMS.forEach(function (item) {
          var li = document.createElement('li');
          var a = document.createElement('a');
          a.href = '#';
          a.textContent = item.label;
          a.addEventListener('click', function (e) {
            e.preventDefault();
            triggerExistingNav(item.match);
            closeDrawer();
          });
          li.appendChild(a);
          list.appendChild(li);
        });
      }

      // Cari elemen nav yang SUDAH dirender oleh bundle1.min.js berdasarkan
      // teksnya, lalu "klik" elemen itu — supaya routing SPA yang sudah ada tetap dipakai.
      function triggerExistingNav(matchText) {
        var candidates = document.querySelectorAll('#app button, #app a, #app [role="button"]');
        for (var i = 0; i < candidates.length; i++) {
          var el = candidates[i];
          if (el.closest('#hb-overlay')) continue;
          if (el.textContent && el.textContent.trim().indexOf(matchText) !== -1) {
            el.click();
            return;
          }
        }
        console.warn('[hamburger] Tombol nav dengan teks "' + matchText + '" tidak ditemukan di halaman ini.');
      }

      function openDrawer() {
        drawer.classList.add('open');
        backdrop.classList.add('show');
        toggleBtn.classList.add('open');
      }
      function closeDrawer() {
        drawer.classList.remove('open');
        backdrop.classList.remove('show');
        toggleBtn.classList.remove('open');
      }

      toggleBtn.addEventListener('click', function () {
        if (window.innerWidth > 768) {
          document.body.classList.toggle('sidebar-collapsed');
          toggleBtn.classList.toggle('open');
        } else {
          drawer.classList.contains('open') ? closeDrawer() : openDrawer();
        }
      });
      backdrop.addEventListener('click', closeDrawer);

      // Hamburger cuma muncul setelah login (saat sidebar sudah dirender App).
      // Karena app ini SPA yang me-render ulang #app, kita pantau perubahannya.
      function updateVisibility() {
        var loggedIn = !!document.querySelector('#app .sidebar');
        toggleBtn.classList.toggle('visible', loggedIn);
        if (!loggedIn) closeDrawer(); // auto-tutup drawer kalau balik ke login (misal logout)
      }

      var appEl = document.getElementById('app');
      if (appEl) {
        new MutationObserver(updateVisibility).observe(appEl, { childList: true, subtree: true });
      }
      updateVisibility(); // cek langsung saat pertama load

      buildMenu();
    })();
  </script>

  <script src="bundle1.min.js"></script>

  <footer class="site-footer">
    Copyright &copy; 2026 Infotama Lintas Global &mdash; All rights reserved.
  </footer>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/pwa/sw.js');
    }
    // fallback buat browser yang nggak support Background Sync (Safari/iOS)
    window.addEventListener('online', () => {
      navigator.serviceWorker.ready.then((reg) => {
        reg.active?.postMessage({ type: 'TRY_SYNC_RESULTS' });
      });
    });
  </script>

</body>
</html>
