<!--
  HAMBURGER MENU — ILG SmartTest
  ==============================
  Cara pasang:
  1. Tempel blok <div id="hb-overlay">...</div> ini PERSIS SEBELUM baris
     <div id="app"></div> di index.html Anda (jadi sejajar, bukan di dalamnya).
  2. Tempel blok <style> ke dalam <head>, atau taruh isinya di file .css terpisah.
  3. Tempel blok <script> SEBELUM <script src="bundle1.min.js">, supaya
     hamburger sudah siap sebelum app SPA-nya render.
  4. Sesuaikan daftar MENU_ITEMS di bagian bawah script sesuai teks tombol
     nav yang sudah ada di app Anda (harus sama persis teksnya).
-->

<div id="hb-overlay">
  <button id="hb-toggle" aria-label="Buka menu">
    <span></span><span></span><span></span>
  </button>

  <div id="hb-backdrop"></div>

  <nav id="hb-drawer">
    <div class="hb-drawer-header">
      <img src="logoilg.jpeg" alt="Logo" class="hb-logo" />
      <span>ILG SmartTest</span>
    </div>
    <ul id="hb-menu-list"><!-- diisi otomatis lewat JS --></ul>
  </nav>
</div>

<style>
  #hb-toggle {
    position: fixed;
    top: 14px;
    left: 14px;
    z-index: 1000;
    width: 42px;
    height: 42px;
    border-radius: 10px;
    border: none;
    background: rgba(20, 18, 40, 0.7);
    backdrop-filter: blur(6px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 5px;
    cursor: pointer;
  }
  #hb-toggle span {
    display: block;
    width: 20px;
    height: 2px;
    background: #ffffff;
    border-radius: 2px;
    transition: transform 0.25s ease, opacity 0.25s ease;
  }
  #hb-toggle.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  #hb-toggle.open span:nth-child(2) { opacity: 0; }
  #hb-toggle.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  #hb-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 998;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }
  #hb-backdrop.show { opacity: 1; pointer-events: auto; }

  #hb-drawer {
    position: fixed;
    top: 0;
    left: 0;
    height: 100%;
    width: 260px;
    max-width: 78vw;
    background: #14121f;
    border-right: 1px solid rgba(255, 255, 255, 0.08);
    z-index: 999;
    transform: translateX(-100%);
    transition: transform 0.28s ease;
    display: flex;
    flex-direction: column;
    padding-top: 20px;
  }
  #hb-drawer.open { transform: translateX(0); }

  .hb-drawer-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 18px 20px 18px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    color: #fff;
    font-weight: 700;
  }
  .hb-logo { width: 32px; height: 32px; border-radius: 8px; object-fit: cover; }

  #hb-menu-list { list-style: none; margin: 0; padding: 10px 0; }
  #hb-menu-list li a {
    display: block;
    padding: 13px 20px;
    color: #d8d6f0;
    text-decoration: none;
    font-size: 15px;
  }
  #hb-menu-list li a:hover,
  #hb-menu-list li a:active {
    background: rgba(109, 91, 208, 0.18);
    color: #fff;
  }
</style>

<script>
  (function () {
    // Sesuaikan daftar ini dengan teks tombol nav yang SUDAH ADA di app Anda.
    // 'match' = teks yang dicari di dalam tombol/link nav yang sudah dirender bundle1.min.js.
    // 'label' = teks yang tampil di drawer hamburger.
    var MENU_ITEMS = [
      { label: 'Beranda', match: 'Beranda' },
      { label: 'Kuis Saya', match: 'Kuis Saya' },
      { label: 'Hasil Saya', match: 'Hasil Saya' },
      { label: 'Keluar', match: 'Keluar' }
    ];

    var toggleBtn = document.getElementById('hb-toggle');
    var drawer = document.getElementById('hb-drawer');
    var backdrop = document.getElementById('hb-backdrop');
    var list = document.getElementById('hb-menu-list');

    function buildMenu() {
      list.innerHTML = '';
      MENU_ITEMS.forEach(function (item) {
        var li = document.createElement('li');
        var a = document.createElement('a');
        a.href = '#';
        a.textContent = item.label;
        a.addEventListener('click', function (e) {
          e.preventDefault();
          triggerExistingNav(item.match);
          closeDrawer();
        });
        li.appendChild(a);
        list.appendChild(li);
      });
    }

    // Cari elemen nav yang SUDAH dirender oleh bundle1.min.js berdasarkan teksnya,
    // lalu "klik" elemen itu — supaya routing SPA yang sudah ada tetap dipakai.
    function triggerExistingNav(matchText) {
      var candidates = document.querySelectorAll('#app button, #app a, #app [role="button"]');
      for (var i = 0; i < candidates.length; i++) {
        var el = candidates[i];
        if (el.closest('#hb-overlay')) continue; // jangan klik diri sendiri
        if (el.textContent && el.textContent.trim().indexOf(matchText) !== -1) {
          el.click();
          return;
        }
      }
      console.warn('[hamburger] Tombol nav dengan teks "' + matchText + '" tidak ditemukan di halaman ini.');
    }

    function openDrawer() {
      drawer.classList.add('open');
      backdrop.classList.add('show');
      toggleBtn.classList.add('open');
    }
    function closeDrawer() {
      drawer.classList.remove('open');
      backdrop.classList.remove('show');
      toggleBtn.classList.remove('open');
    }

    toggleBtn.addEventListener('click', function () {
      drawer.classList.contains('open') ? closeDrawer() : openDrawer();
    });
    backdrop.addEventListener('click', closeDrawer);

    buildMenu();
  })();
</script>
